<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; margin: 0; padding: 0; }
        .page { max-width: 420px; margin: 80px auto; padding: 24px; background: #fff; border-radius: 10px; box-shadow: 0 12px 24px rgba(0,0,0,.08); text-align: center; }
        h1 { margin-top: 0; }
        a { display: inline-block; margin-top: 18px; color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
<div class="page">
    <h1>Welcome, {{.Username}}!</h1>
    <p>You are logged in successfully.</p>
    <a href="/logout">Log out</a>
</div>
</body>
</html>
